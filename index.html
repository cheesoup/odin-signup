<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Welcome to Zombocom</title>
		<link rel="stylesheet" href="style.css">
		<script src="script.js" defer></script>
	</head>
	<body>
		<div class="splash">
			<div class="logo"><img src="img/odin-lined.png"/>ODIN</div>
			<div class="credits">Photo by Halie West on Unsplash</div>
		</div>
		<div class="content">
			<div class="flavor">
				<h2>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up <em>now</em> to get started.</h2>
				<h2>You <em>know</em> you want to.</h2>
			</div>
			<form action="example.com/path" method="post">
				<h2>Let's do this!</h2>
				<section class="row">
					<div>
						<label for="firstname">First Name</label>
						<input id='firstname' name='firstname' type='text'/>
					</div>
					<div>
						<label for="lastname">Last Name</label>
						<input id='lastname' name='lastname' type='text'/>
					</div>
				</section>
				<section class="row">
					<div>
						<label for="firstname">Email</label>
						<input id='firstname' name='firstname' type='text'/>
					</div>
					<div>
						<label for="lastname">Phone Number</label>
						<input id='lastname' name='lastname' type='text'/>
					</div>
				</section>
				<section class="row">
					<div>
						<label for="firstname">Password</label>
						<input id='firstname' name='firstname' type='text'/>
					</div>
					<div>
						<label for="lastname">Confirm Password</label>
						<input id='lastname' name='lastname' type='text'/>
					</div>
				</section>
			</form>
			<div class="submit">
				<button>Create Account</button>
				<p>Already have an account? <a href="#">Log in</a>
			</div>
		</div>
	</body>
</html>
