<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Sign up now!</title>
		<link rel="stylesheet" href="style.css">
		<!--	<script src="script.js" defer></script> -->
	</head>
	<body>
		<aside>
			<header><img src="img/odin-lined.png"/>Odin</header>
			<footer>Illustration by <a href="https://pixabay.com/users/prawny-162579/">Prawny</a> on <a href="https://pixabay.com/illustrations/abstract-background-pattern-design-1667136/">Pixabay</a></footer>
		</aside>
		<main>
			<header>
				<h2>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up <em>now</em> to get started.</h2>
				<h2>You <em>know</em> you want to.</h2>
			</header>
			<form id="user_info" action="https://httpbin.org/post" method="post">
				<h2>Let's do this!</h2>
				<div>
					<div>
						<input id="user_firstname" name="user_firstname" type="text" minlength="1" placeholder="John" required/>
						<label for="user_firstname">First Name</label>
					</div>
					<div>
						<input id="user_lastname" name="user_lastname" type="text" minlength="1" placeholder="Smith" required/>
						<label for="user_lastname">Last Name</label>
					</div>
				</div>
				<div>
					<div>
						<input type="email" id="user_email" name="user_email" placeholder="john.smith@example.com" required>
						<label for="user_email">Email</label>
					</div>
					<div>
						<input type="tel" id="user_tel" name="user_tel" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" placeholder="123-456-7890" required>
						<label for="user_tel">Phone#</label>
					</div>
				</div>
				<div>
					<div>
						<input type="password" id="user_password" name="user_password" minlength="8" maxlength="64" required>
						<label for="user_password">Password</label>
					</div>
					<div>
						<input type="password" id="user_confirm" name="user_confirm" minlength="8" maxlength="64" required>
						<label for="user_confirm">Confirm Password</label>
					</div>
				</div>
			</form>
			<footer>
				<button type="submit" form="user_info">Create Account</button>
				<p>Already have an account? <a href="#">Log in</a>
			</footer>
		</main>
	</body>
</html>
